<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Document</title>
    <style>
        /* This removes all default spacing around the edge of the screen */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            }


        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <iframe src="document.pdf#view=FitH" type="application/pdf">
        <p>Your browser does not support PDFs. 
           <a href="document.pdf">Click here to download the PDF.</a>
        </p>
    </iframe>

</body>
</html>
